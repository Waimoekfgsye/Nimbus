name: Compile Windows Browser Binary
on:
  workflow_dispatch: # Allows you to manually trigger the build via a button

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Docker Build Environment
        run: |
          docker build -t nimbus-builder .

      - name: Execute Windows Compilation Compiler
        run: |
          docker run -v "$(pwd)/dist:/app/dist" nimbus-builder --target windows --arch x86_64

      - name: Upload Finished Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nimbus-Windows-64bit
          path: dist/
