name: Compile Windows Browser Binary
on:
  workflow_dispatch: # Allows you to manually click a button to start the build

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Builder
        run: |
          docker build -t nimbus-builder .

      - name: Run Windows Compiler Engine
        run: |
          docker run -v "$(pwd)/dist:/app/dist" nimbus-builder --target windows --arch x86_64

      - name: Save Browser Executable File
        uses: actions/upload-artifact@v4
        with:
          name: Nimbus-Windows-Browser
          path: dist/
